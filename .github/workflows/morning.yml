name: Boatrace Morning
on:
  schedule:
    - cron: '50 22 * * *'   # 22:50 UTC = 07:50 JST
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Tokyo
  DISCORD_WEBHOOK_BOATRACE: ${{ secrets.DISCORD_WEBHOOK_BOATRACE }}
  DISCORD_WEBHOOK_BOATRACE_RESULTS: ${{ secrets.DISCORD_WEBHOOK_BOATRACE_RESULTS }}

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4時間 (8:00-12:00)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          git pull || true
          python race_day.py --until 13:30 --gensen
      - name: Commit data
        run: |
          git config user.name "boatrace-bot"
          git config user.email "bot@boatrace.ai"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date +%Y%m%d) morning"
          git push

  settle:
    runs-on: ubuntu-latest
    needs: morning
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          git pull
          python result_checker.py
      - name: Commit results
        run: |
          git config user.name "boatrace-bot"
          git config user.email "bot@boatrace.ai"
          git add data/
          git diff --cached --quiet || git commit -m "results: $(date +%Y%m%d) morning settlement"
          git push
