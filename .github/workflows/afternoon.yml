name: Boatrace Afternoon
on:
  schedule:
    - cron: '20 4 * * *'    # 04:20 UTC = 13:20 JST
  workflow_dispatch:

permissions:
  contents: write

env:
  DISCORD_WEBHOOK_BOATRACE: ${{ secrets.DISCORD_WEBHOOK_BOATRACE }}
  DISCORD_WEBHOOK_BOATRACE_RESULTS: ${{ secrets.DISCORD_WEBHOOK_BOATRACE_RESULTS }}

jobs:
  afternoon:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5時間 (13:20-17:30)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          git pull
          python race_day.py --from 13:00
      - name: Commit data
        run: |
          git config user.name "boatrace-bot"
          git config user.email "bot@boatrace.ai"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date +%Y%m%d) afternoon"
          git push

  settle:
    runs-on: ubuntu-latest
    needs: afternoon
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          git pull
          python result_checker.py
      - name: Commit results
        run: |
          git config user.name "boatrace-bot"
          git config user.email "bot@boatrace.ai"
          git add data/
          git diff --cached --quiet || git commit -m "results: $(date +%Y%m%d) settlement"
          git push
